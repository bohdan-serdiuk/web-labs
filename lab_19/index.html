<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
        }
        .main__header{
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #6e6e6e;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 8px 16px;
        }
        .main__header p{
            font-weight: bold;
            color: #fff;
        }
        .main__header button{
            padding: 4px 16px;
            background: none;
            border: 1px solid white;
            border-radius: 4px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }
        .modal{
            z-index: 10000;
            position: fixed;
            width: 500px;
            background-color: #fff;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .modal form{
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 16px;
        }
        .modal main{
            display: flex;
            flex-direction: column;
        }
        .modal main input, select, textarea{
            margin-bottom: 16px;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid grey;
        }
        .modal__header{
            background-color: #8cadeb;
            position: relative;
            color: #fff;
            padding: 15px;
            text-align: center;
        }
        .modal__header__exit-button{
            padding: 4px;
            position: absolute;
            right: 4px;
            top: 4px;
        }
        .modal__footer{
            text-align: center;
        }
        .modal__footer button{
            padding: 8px 24px
        }
        .overlay{
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
        }
    </style>
</head>
<body>
    <header class="main__header">
        <p>eShop</p>
        <button id="createProduct">Create product</button>
    </header>

    <div class="overlay" id="overlay" hidden></div>

    <div class="modal" id="modal" hidden>
        <header class="modal__header">
            <h1>Create product</h1>
            <button type="button" class="modal__header__exit-button" id="exit">&times;</button>
        </header>
        <form action="">
            <main>
                <label for="title">Title</label>
                <input type="text" name="title" id="title" required>

                <label for="description">Description</label>
                <textarea name="description" rows="2" id="description" required></textarea>

                <label for="price">Price</label>
                <input type="number" name="price" id="price" required min="0">

                <label for="discount">Discount</label>
                <input type="number" name="discount" id="discount" required min="0" max="100">

                <label for="inStock">In stock</label>
                <input type="number" name="inStock" id="inStock" min="0">

                <label for="category">Category</label>
                <select name="category" id="category" required>
                    <option value="smartphones">Smartphones</option>
                    <option value="laptops">Laptops</option>
                    <option value="headphones">Headphones</option>
                </select>

                <label for="linkToPicture">Link to picture</label>
                <input type="text" name="linkToPicture" id="linkToPicture" required>
            </main>
            <footer class="modal__footer">
                <button>Save product</button>
            </footer>
        </form>
    </div>

    <script>
        let form = document.forms[0];
        let overlay = document.getElementById('overlay');
        let modal = document.getElementById('modal');
        let createProductBtn = document.getElementById('createProduct');
        let products = [];

        createProductBtn.addEventListener('click', () => {
            overlay.hidden = false;
            modal.hidden = false;
        })

        form.addEventListener('submit', e => {
            e.preventDefault();
            if(form.checkValidity()){
                products.push(Object.fromEntries(new FormData(form).entries()));
                console.log(products);
            }
        })
        document.addEventListener('click', e => {
            if(e.target == document.getElementById('exit') || e.target == overlay){
                overlay.hidden = true;
                modal.hidden = true;
            }
        })
    </script>
</body>
</html>

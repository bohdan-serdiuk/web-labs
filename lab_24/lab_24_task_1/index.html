<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <title>Document</title>
</head>
<body>
    <a href="https://google.com">https://google.com</a><br>
    <a href="http://example.com">http://example.com</a><br>
    <a href="https://github.com">https://github.com</a><br>
    <a href="/local/page">/local/page</a>

    <script>
        $('a').each(function () {
            if ($(this).attr('href') && $(this).attr('href').startsWith('https://')) {
                $(this).attr('target', '_blank');
            }
        });
    </script>

</body>
</html>

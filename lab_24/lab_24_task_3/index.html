<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <title>Document</title>
</head>
<body>
    <h3>header1</h3>
    <div>text1</div>
    <h3>header2</h3>
    <div>text2</div>

    <script>
        $('h3 + div').each(function () {
            let $div = $(this);
            let $h3  = $div.prev('h3');
            $div.insertBefore($h3);
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        class Student{
            constructor(name, age, grade){
                this.name = name;
                this.age = age;
                this.grade = grade;
            }
            study(){
                console.log(this.name, this.age, this.grade);
            }
        }

        let student1 = new Student('Bohdan', 18, 4);
        student1.study();
        let student2 = new Student('Max', 18, 4.2);
        student2.study();
        let student3 = new Student('John', 17, 4.4);
        student3.study();
    </script>
</body>
</html>

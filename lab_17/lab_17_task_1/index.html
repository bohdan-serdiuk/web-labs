<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>Сердюк Богдан</title>
  <style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    .card {
        position: relative;
        width: 400px;
        padding: 16px;
        margin: 10px;
        border: 1px solid #000000;
        border-radius: 8px;
    }

    .btn-delete {
        position: absolute;
        top: 8px;
        right: 8px;
        cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Заголовок 1</h2>
    <p>Перший блок</p>
  </div>

  <div class="card">
    <h2>Заголовок 2</h2>
    <p>Другий блок</p>
  </div>

  <div class="card">
    <h2>Заголовок 3</h2>
    <p>Третій блок</p>
  </div>

  <div class="card">
    <h2>Заголовок 4</h2>
    <p>Четвертий блок</p>
  </div>

  <script>
    const cards = document.querySelectorAll('.card');

    cards.forEach(card => {
      const btn = document.createElement('button');
      btn.textContent = 'x';
      btn.className = 'btn-delete';

      btn.addEventListener('click', () => {
        card.remove();
      });

      card.append(btn);
    });
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сердюк Богдан</title>
    <style>
        .container{
            padding: 15px;
            height: 300px;
            width: 900px;
            background-color: #adadad;
            display: flex;
            gap: 15px;
        }
        .box{
            height: 100%;
            width: 25%;
            background-color: #e4e4e4;
            text-align: center;
        }
        .active{
            background-color: #65db36;
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
        <div class="box">Box 4</div>
    </div>

    <button id="btn">Сховати обрані елементи</button>

    <script>
        let container = document.getElementById('container');
        let btn = document.getElementById('btn');
        let elementsToHide;

        container.addEventListener('click', e => {
            let target = e.target.closest('.box');

            if(!target) return;
            if(!container.contains(target)) return;

            target.classList.toggle('active');
        });

        btn.addEventListener('click', () => {
            elementsToHide = container.querySelectorAll('.active');
            
            elementsToHide.forEach((value) => value.hidden = !value.hidden);
        })
    </script>
</body>
</html>
